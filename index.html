<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Canvas (particles + mask) ── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Main layout ── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ── Date ── */
    .date {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
    }

    /* ── Label ── */
    .label {
      margin-top: 18px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 900;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff30;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: fixed;
      bottom: clamp(32px, 5vh, 56px);
      left: 50%;
      transform: translateX(-50%);
    }

    .logo {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #FF6B00 0%, #FF3B3B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* hint */
    .hint {
      position: fixed;
      bottom: clamp(90px, 12vh, 120px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #ffffff18;
      white-space: nowrap;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="dust"></canvas>

  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>

  <div class="logo-wrap">
    <div class="logo">vehob</div>
  </div>

  <div class="hint">swipe to reveal</div>

  <script>
    // ── Setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('dust');
    const ctx    = canvas.getContext('2d');
    let W, H, particles, animId;

    // Offscreen mask: black = covered, transparent hole = revealed
    const mask  = document.createElement('canvas');
    const mctx  = mask.getContext('2d');

    const COLORS      = ['#FF5500','#FF6B00','#E84800','#FF4000','#CC3700','#FF7020','#D94400','#FF4500','#C23300','#FF5200'];
    const COUNT       = 3000;  // visible flying particles on swipe
    const REVEAL_R    = 55;
    const REPEL_R     = 55;
    const REPEL_FORCE = 6.0;
    const FRICTION    = 0.82;

    const pointer = { x: -9999, y: -9999, active: false };

    // ── Resize ────────────────────────────────────────────────────────
    function resize() {
      W = canvas.width = mask.width = window.innerWidth;
      H = canvas.height = mask.height = window.innerHeight;
      buildMask();
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    // ── Build mask: solid fill + layered grain for real dust texture ───
    function buildMask() {
      mctx.globalCompositeOperation = 'source-over';

      // Base coat
      mctx.fillStyle = '#B83200';
      mctx.fillRect(0, 0, W, H);

      // Layer 1 — large soft blobs for depth
      for (let i = 0; i < 3000; i++) {
        const x = rand(0, W), y = rand(0, H);
        const r = rand(3, 14);
        const a = rand(0.05, 0.25);
        mctx.beginPath();
        mctx.arc(x, y, r, 0, Math.PI * 2);
        mctx.fillStyle = COLORS[Math.floor(Math.random() * COLORS.length)] + Math.floor(a * 255).toString(16).padStart(2,'0');
        mctx.fill();
      }

      // Layer 2 — medium grains
      for (let i = 0; i < 25000; i++) {
        const x = rand(0, W), y = rand(0, H);
        const r = rand(0.4, 2.2);
        const a = rand(0.3, 0.9);
        mctx.beginPath();
        mctx.arc(x, y, r, 0, Math.PI * 2);
        mctx.fillStyle = COLORS[Math.floor(Math.random() * COLORS.length)] + Math.floor(a * 255).toString(16).padStart(2,'0');
        mctx.fill();
      }

      // Layer 3 — micro dust specks
      for (let i = 0; i < 40000; i++) {
        const x = rand(0, W), y = rand(0, H);
        mctx.fillStyle = COLORS[Math.floor(Math.random() * COLORS.length)] + Math.floor(rand(0.2, 0.7) * 255).toString(16).padStart(2,'0');
        mctx.fillRect(x, y, rand(0.3, 1.0), rand(0.3, 1.0));
      }
    }

    // ── Flying particles — scatter visibly on swipe ───────────────────
    function makeParticle() {
      return {
        x:    rand(0, W),
        y:    rand(0, H),
        r:    rand(1.0, 3.5),
        evx:  0,
        evy:  0,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: rand(0.7, 1.0),
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: COUNT }, makeParticle);
    }

    // ── Reveal brush — cuts a transparent hole in the mask ────────────
    function revealAt(x, y) {
      mctx.globalCompositeOperation = 'destination-out';
      const g = mctx.createRadialGradient(x, y, 0, x, y, REVEAL_R);
      g.addColorStop(0,   'rgba(0,0,0,1)');
      g.addColorStop(0.4, 'rgba(0,0,0,0.95)');
      g.addColorStop(1,   'rgba(0,0,0,0)');
      mctx.fillStyle = g;
      mctx.beginPath();
      mctx.arc(x, y, REVEAL_R, 0, Math.PI * 2);
      mctx.fill();
      mctx.globalCompositeOperation = 'source-over';
    }

    // ── Draw loop ─────────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Update physics
      particles.forEach(p => {
        if (pointer.active) {
          const dx   = p.x - pointer.x;
          const dy   = p.y - pointer.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < REPEL_R && dist > 0) {
            const force = (1 - dist / REPEL_R) * REPEL_FORCE;
            p.evx += (dx / dist) * force;
            p.evy += (dy / dist) * force;
          }
        }
        p.evx *= FRICTION;
        p.evy *= FRICTION;
        p.x   += p.evx;
        p.y   += p.evy;
        if (p.x < 0) p.x = 0;
        if (p.x > W) p.x = W;
        if (p.y < 0) p.y = 0;
        if (p.y > H) p.y = H;
      });

      // 1. Draw mask (full orange dust with holes cut by user)
      ctx.drawImage(mask, 0, 0);

      // 2. Flying particles drawn on TOP of everything — visible everywhere
      //    so you see them scatter across both covered and revealed areas
      ctx.globalCompositeOperation = 'source-over';
      particles.forEach(p => {
        const speed = Math.sqrt(p.evx * p.evx + p.evy * p.evy);
        if (speed < 0.08) return; // only draw when actually moving
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.floor(Math.min(speed * 0.4, 1) * p.alpha * 255).toString(16).padStart(2,'0');
        ctx.fill();
      });

      animId = requestAnimationFrame(draw);
    }

    // ── Init ──────────────────────────────────────────────────────────
    init();
    draw();

    // ── Pointer events ────────────────────────────────────────────────
    window.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
      revealAt(e.clientX, e.clientY);
    });
    window.addEventListener('mouseleave', () => { pointer.active = false; });

    window.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
      revealAt(t.clientX, t.clientY);
    }, { passive: true });
    window.addEventListener('touchend',  () => { pointer.active = false; });

    window.addEventListener('resize', () => {
      resize();
      particles.forEach(p => { p.x = rand(0, W); p.y = rand(0, H); });
    });
  </script>
</body>
</html>
