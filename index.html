<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Canvas (particles) ── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 1.2s ease;
    }
    canvas.hidden { opacity: 0; }

    /* ── Main layout ── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      user-select: none;
    }

    /* ── Date ── */
    .date {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    /* ── Label ── */
    .label {
      margin-top: 18px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 900;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff30;
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: fixed;
      bottom: clamp(32px, 5vh, 56px);
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards;
    }

    .logo {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #FF6B00 0%, #FF3B3B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="dust"></canvas>

  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>

  <div class="logo-wrap">
    <div class="logo">vehob</div>
  </div>

  <script>
    // ── Particle system ──────────────────────────────────────────────
    const canvas  = document.getElementById('dust');
    const ctx     = canvas.getContext('2d');
    let W, H, particles, animId;

    // Pointer (mouse or touch)
    const pointer = { x: -9999, y: -9999, active: false };
    const REPEL_RADIUS = 90;
    const REPEL_FORCE  = 2.8;
    const FRICTION     = 0.92; // how fast extra velocity bleeds off (drift back)

    const COUNT  = 2000;
    const COLORS = ['#FF5500','#FF6B00','#E84800','#FF4000','#CC3700','#FF7020','#D94400'];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function makeParticle(fromBottom) {
      return {
        x:    rand(0, W),
        y:    fromBottom ? H + rand(0, 8) : rand(0, H),
        r:    rand(0.2, 0.9),
        // base drift velocity
        bvx:  rand(-0.08, 0.08),
        bvy:  rand(-0.18, -0.03),
        // extra velocity from repulsion
        evx:  0,
        evy:  0,
        baseAlpha:    rand(0.25, 0.75),
        color:        COLORS[Math.floor(Math.random() * COLORS.length)],
        twinkle:      rand(0, Math.PI * 2),
        twinkleSpeed: rand(0.003, 0.012),
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: COUNT }, () => makeParticle(false));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      particles.forEach((p, i) => {
        // Repulsion from pointer
        if (pointer.active) {
          const dx = p.x - pointer.x;
          const dy = p.y - pointer.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < REPEL_RADIUS && dist > 0) {
            const force = (1 - dist / REPEL_RADIUS) * REPEL_FORCE;
            p.evx += (dx / dist) * force;
            p.evy += (dy / dist) * force;
          }
        }

        // Apply friction to extra velocity (drift back)
        p.evx *= FRICTION;
        p.evy *= FRICTION;

        p.twinkle += p.twinkleSpeed;
        p.x += p.bvx + p.evx;
        p.y += p.bvy + p.evy;

        if (p.y < -2) {
          particles[i] = makeParticle(true);
          return;
        }
        // wrap horizontally
        if (p.x < -2)  p.x = W + 2;
        if (p.x > W+2) p.x = -2;

        const a = p.baseAlpha * (0.7 + 0.3 * Math.sin(p.twinkle));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.floor(a * 255).toString(16).padStart(2, '0');
        ctx.fill();
      });

      animId = requestAnimationFrame(draw);
    }

    // ── Init ────────────────────────────────────────────────────────
    init();
    draw();

    // Pointer tracking (mouse)
    window.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
    });
    window.addEventListener('mouseleave', () => { pointer.active = false; });

    // Pointer tracking (touch) — no dismiss on move, just repel
    window.addEventListener('touchmove', e => {
      pointer.x = e.touches[0].clientX;
      pointer.y = e.touches[0].clientY;
      pointer.active = true;
    }, { passive: true });
    window.addEventListener('touchend', () => { pointer.active = false; });

    window.addEventListener('resize', () => {
      resize();
      particles.forEach(p => {
        p.x = rand(0, W);
        p.y = rand(0, H);
      });
    });
  </script>
</body>
</html>
