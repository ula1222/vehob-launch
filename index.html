<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a0400;
      font-family: 'Inter', sans-serif;
    }
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none; pointer-events: none;
    }
    .date {
      font-size: clamp(48px,12vw,140px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1; color: #fff;
    }
    .label {
      margin-top: 18px; font-size: clamp(11px,1.6vw,15px);
      font-weight: 900; letter-spacing: 0.28em;
      text-transform: uppercase; color: #ffffff35;
    }
    .logo-wrap {
      position: fixed; bottom: clamp(32px,5vh,56px);
      left: 50%; transform: translateX(-50%); pointer-events: none;
    }
    .logo {
      font-size: clamp(28px,5vw,48px); font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg,#FF6B00,#FF3B3B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hint {
      position: fixed; bottom: clamp(90px,12vh,120px);
      left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 0.22em;
      text-transform: uppercase; color: #ffffff22; white-space: nowrap;
      pointer-events: none; animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.8} }
    #c {
      position: fixed; inset: 0;
      touch-action: none;
      will-change: transform;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>
  <div class="logo-wrap"><div class="logo">vehob</div></div>
  <div class="hint">swipe to reveal</div>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    let W, H;
    const rand = (a, b) => Math.random() * (b - a) + a;

    // ── Build realistic powder texture ────────────────────────────────
    function buildTexture() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;

      const img = ctx.createImageData(W, H);
      const d   = img.data;

      // Base: dark reddish-brown between grains (inter-grain shadow)
      for (let p = 0; p < d.length; p += 4) {
        d[p] = 88; d[p+1] = 24; d[p+2] = 4; d[p+3] = 255;
      }

      // Random circular grains — mixed sizes for organic look
      const numG = (W * H / 4) | 0;
      for (let g = 0; g < numG; g++) {
        const gx  = rand(0, W) | 0;
        const gy  = rand(0, H) | 0;
        const rnd = Math.random();
        // Size distribution: 20% tiny(1), 65% medium(2), 15% large(3)
        const gr  = rnd < 0.20 ? 1 : rnd < 0.85 ? 2 : 3;
        const brt = rand(0.55, 1.45);
        const cR  = Math.min(255, (rand(195, 255) * brt) | 0);
        const cG  = Math.min(255, (rand(55,  118) * brt) | 0);
        const cB  = rand(0, 14) | 0;
        const gr2 = gr * gr;

        for (let dy = -gr; dy <= gr; dy++) {
          for (let dx = -gr; dx <= gr; dx++) {
            const d2 = dx*dx + dy*dy;
            if (d2 > gr2 + 0.5) continue;
            const px = gx+dx, py = gy+dy;
            if (px < 0 || px >= W || py < 0 || py >= H) continue;
            const pi  = (py * W + px) * 4;
            // Sphere shading: bright centre → darker edge
            const sph = 1.0 - (d2 / (gr2 || 1)) * 0.42;
            d[pi]   = Math.min(255, (cR * sph) | 0);
            d[pi+1] = Math.min(255, (cG * sph) | 0);
            d[pi+2] = Math.min(255, (cB * sph) | 0);
          }
        }
      }

      ctx.putImageData(img, 0, 0);
    }

    // ── Brush erase ───────────────────────────────────────────────────
    const BRUSH_R = 60;

    function eraseLine(x1, y1, x2, y2) {
      const dx    = x2 - x1, dy = y2 - y1;
      const dist  = Math.sqrt(dx*dx + dy*dy);
      const steps = Math.max(1, Math.ceil(dist / (BRUSH_R * 0.35)));

      ctx.globalCompositeOperation = 'destination-out';
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const x = x1 + dx*t, y = y1 + dy*t;
        const g = ctx.createRadialGradient(x, y, 0, x, y, BRUSH_R);
        g.addColorStop(0,    'rgba(0,0,0,1)');
        g.addColorStop(0.55, 'rgba(0,0,0,0.95)');
        g.addColorStop(0.85, 'rgba(0,0,0,0.5)');
        g.addColorStop(1,    'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, BRUSH_R, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = 'source-over';
    }

    // ── Input — RAF-batched for 60fps on mobile ───────────────────────
    let down = false, lx = 0, ly = 0;
    let rafPending = false, nx = 0, ny = 0, ox = 0, oy = 0;

    function flush() {
      rafPending = false;
      eraseLine(ox, oy, nx, ny);
    }

    function move(x, y) {
      if (!down) return;
      ox = lx; oy = ly;
      lx = nx = x; ly = ny = y;
      if (!rafPending) { rafPending = true; requestAnimationFrame(flush); }
    }

    function start(x, y) {
      down = true; lx = x; ly = y;
      eraseLine(x, y, x, y);
    }

    function end() { down = false; }

    canvas.addEventListener('pointerdown',  e => { e.preventDefault(); start(e.clientX, e.clientY); }, { passive: false });
    canvas.addEventListener('pointermove',  e => { e.preventDefault(); move(e.clientX, e.clientY);  }, { passive: false });
    canvas.addEventListener('pointerup',    end);
    canvas.addEventListener('pointerleave', end);
    canvas.addEventListener('touchstart',   e => { e.preventDefault(); const t=e.touches[0]; start(t.clientX,t.clientY); }, { passive: false });
    canvas.addEventListener('touchmove',    e => { e.preventDefault(); const t=e.touches[0]; move(t.clientX,t.clientY);  }, { passive: false });
    canvas.addEventListener('touchend',     end);
    window.addEventListener('resize', buildTexture);

    buildTexture();
  </script>
</body>
</html>
