<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a0400;
      font-family: 'Inter', sans-serif;
    }
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none; pointer-events: none;
    }
    .date {
      font-size: clamp(48px,12vw,140px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1; color: #fff;
    }
    .label {
      margin-top: 18px; font-size: clamp(11px,1.6vw,15px);
      font-weight: 900; letter-spacing: 0.28em;
      text-transform: uppercase; color: #ffffff35;
    }
    .logo-wrap {
      position: fixed; bottom: clamp(32px,5vh,56px);
      left: 50%; transform: translateX(-50%); pointer-events: none;
    }
    .logo {
      font-size: clamp(28px,5vw,48px); font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg,#FF6B00,#FF3B3B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hint {
      position: fixed; bottom: clamp(90px,12vh,120px);
      left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 0.22em;
      text-transform: uppercase; color: #ffffff22; white-space: nowrap;
      pointer-events: none; animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.8} }
    #c { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>
  <div class="logo-wrap"><div class="logo">vehob</div></div>
  <div class="hint">swipe to reveal</div>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H, cols, rows, N, imgData;

    // ── Grid ─────────────────────────────────────────────────────────
    const GRID       = 2;    // px per cell — finer grain
    const PUSH_R     = 90;   // medium brush
    const PUSH_FORCE = 5.0;  // edge scatter force
    const FRICTION   = 0.88;
    const FLOW       = 0.40;
    const NORM_SCALE = 1.2;
    const GRAIN_NS   = 0.2;

    let H_cur, H_nxt, VX, VY, GR, GG, GB, GNX, GNY, PN;

    // pointer velocity (px/frame)
    let pX = null, pY = null, pT = null;
    let vX = 0, vY = 0;

    const rand = (a, b) => Math.random() * (b - a) + a;

    // ── Init height map ───────────────────────────────────────────────
    function build() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cols = Math.ceil(W / GRID);
      rows = Math.ceil(H / GRID);
      N    = cols * rows;

      H_cur = new Float32Array(N);
      H_nxt = new Float32Array(N);
      VX    = new Float32Array(N);
      VY    = new Float32Array(N);
      GR    = new Uint8Array(N);   // grain red
      GG    = new Uint8Array(N);   // grain green
      GB    = new Uint8Array(N);   // grain blue
      GNX   = new Float32Array(N); // baked brightness noise
      GNY   = new Float32Array(N); // baked brightness noise 2
      PN    = new Uint8Array(W * H); // baked sub-pixel noise for fine texture

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const i = r * cols + c;
          // Macro dune shape for height
          const dune =
            Math.sin(c * 0.055 + r * 0.040) * 0.13 +
            Math.sin(c * 0.110 - r * 0.075) * 0.09 +
            Math.sin(c * 0.028 + r * 0.100) * 0.05;
          H_cur[i] = 1.0 + dune + rand(-0.04, 0.04);

          // Bright vivid orange-red — match real chili/paprika powder
          // Very subtle cluster variation, mostly per-grain micro noise
          const cluster = 1.0 + 0.06 * Math.sin(c * 0.09 + r * 0.07) * Math.sin(c * 0.05 - r * 0.11);
          const micro   = rand(0.90, 1.10);
          const bright  = cluster * micro;

          GR[i] = Math.min(255, (238 * bright) | 0);
          GG[i] = Math.min(255, (72  * bright + rand(0, 20)) | 0);
          GB[i] = rand(0, 12) | 0;

          GNX[i] = rand(-1, 1);
          GNY[i] = rand(-1, 1);
        }
      }

      // Sub-pixel baked noise: fine texture within each grain cell
      for (let p = 0; p < W * H; p++) PN[p] = (rand(230, 255)) | 0;

      imgData = ctx.createImageData(W, H);
    }

    // ── Push: direct clear in center + scatter at edge ───────────────
    function push(px, py) {
      const speed = Math.sqrt(vX*vX + vY*vY);
      const cx  = (px / GRID) | 0;
      const cy  = (py / GRID) | 0;
      const br  = (PUSH_R / GRID) | 0;
      const slen = Math.max(speed, 0.001);
      const sdx = vX / slen, sdy = vY / slen;

      for (let dy = -br; dy <= br; dy++) {
        for (let dx = -br; dx <= br; dx++) {
          const nc = cx + dx, nr = cy + dy;
          if (nc < 1 || nc >= cols-1 || nr < 1 || nr >= rows-1) continue;
          const d2 = dx*dx + dy*dy;
          if (d2 >= br*br) continue;
          const d = Math.sqrt(d2);
          const t = d / br; // 0=center, 1=edge
          const idx = nr * cols + nc;

          if (t < 0.65) {
            // Inner zone: directly wipe height to 0 with ragged random edge
            const wipe = (1 - t / 0.65) * (0.75 + Math.random() * 0.35);
            H_cur[idx] = Math.max(0, H_cur[idx] - wipe);
          } else {
            // Outer zone: scatter outward in swipe direction
            const rdx = dx / d, rdy = dy / d;
            const angle = (Math.random() - 0.5) * 1.0;
            const cos = Math.cos(angle), sin = Math.sin(angle);
            const pdx = (sdx*0.6 + rdx*0.4) * cos - (sdy*0.6 + rdy*0.4) * sin;
            const pdy = (sdx*0.6 + rdx*0.4) * sin + (sdy*0.6 + rdy*0.4) * cos;
            const f = (t - 0.65) / 0.35 * PUSH_FORCE * (0.5 + Math.random());
            VX[idx] += pdx * f;
            VY[idx] += pdy * f;
          }
        }
      }
    }

    // ── Physics step: height flows between cells ──────────────────────
    function step() {
      H_nxt.set(H_cur);

      for (let r = 1; r < rows-1; r++) {
        for (let c = 1; c < cols-1; c++) {
          const i = r * cols + c;

          VX[i] *= FRICTION;
          VY[i] *= FRICTION;

          const vx = VX[i], vy = VY[i];
          const spd = Math.sqrt(vx*vx + vy*vy);
          if (spd < 0.005) continue;

          const h  = H_cur[i];
          const fx = Math.min(h * FLOW * Math.abs(vx), h * 0.28);
          const fy = Math.min(h * FLOW * Math.abs(vy), h * 0.28);

          if (fx > 0.0001) {
            const tc = vx > 0 ? c+1 : c-1;
            H_nxt[i]         -= fx;
            H_nxt[r*cols+tc] += fx;
          }
          if (fy > 0.0001) {
            const tr = vy > 0 ? r+1 : r-1;
            H_nxt[i]         -= fy;
            H_nxt[tr*cols+c] += fy;
          }

          // Random scatter: disturbed cells shed tiny amount in all 4 dirs
          if (spd > 0.3) {
            const shed = H_cur[i] * 0.012 * Math.random();
            H_nxt[i]            -= shed * 4;
            H_nxt[i+1]          += shed;
            H_nxt[i-1]          += shed;
            H_nxt[i+cols]       += shed;
            H_nxt[i-cols]       += shed;
          }
        }
      }

      const tmp = H_cur; H_cur = H_nxt; H_nxt = tmp;
    }

    // ── Render: grain color + subtle per-grain brightness variation ──
    function render() {
      const data = imgData.data;

      for (let r = 1; r < rows-1; r++) {
        for (let c = 1; c < cols-1; c++) {
          const i = r * cols + c;
          const h = H_cur[i];

          // Very subtle micro-shadow + per-grain brightness variation
          const shadowRaw = Math.max(0, (H_cur[i+1] - h) + (H_cur[i+cols] - h)) * 0.03;
          const shadow = shadowRaw > 0.08 ? 0.08 : shadowRaw;
          const light = 0.88 + GNX[i] * 0.12 + GNY[i] * 0.06 - shadow;

          const cl  = v => v < 0 ? 0 : v > 255 ? 255 : v | 0;
          const Rb  = cl(GR[i] * light);
          const Gb  = cl(GG[i] * light);
          const Bb  = cl(GB[i] * light);
          const A   = cl(Math.min(h, 1.0) * 255);

          const px0 = c * GRID, py0 = r * GRID;
          for (let dy = 0; dy < GRID; dy++) {
            let pi = ((py0+dy) * W + px0) * 4;
            for (let dx = 0; dx < GRID; dx++, pi += 4) {
              // Sub-pixel noise makes each pixel within a cell slightly different
              const pn = PN[(py0+dy) * W + (px0+dx)] / 240;
              data[pi]   = cl(Rb * pn);
              data[pi+1] = cl(Gb * pn);
              data[pi+2] = cl(Bb * pn);
              data[pi+3] = A;
            }
          }
        }
      }

      ctx.putImageData(imgData, 0, 0);
    }

    // ── Loop ──────────────────────────────────────────────────────────
    function loop() { step(); render(); requestAnimationFrame(loop); }

    build();
    loop();

    // ── Input ─────────────────────────────────────────────────────────
    function onMove(x, y) {
      const now = performance.now();
      if (pX !== null) {
        const dt = Math.max(1, Math.min(50, now - pT));
        vX = (x - pX) / dt * 16.67;
        vY = (y - pY) / dt * 16.67;
        push(x, y);
      }
      pX = x; pY = y; pT = now;
    }
    function onEnd() { pX = pY = null; vX = vY = 0; }

    window.addEventListener('mousemove',   e => onMove(e.clientX, e.clientY));
    window.addEventListener('mouseup',     onEnd);
    window.addEventListener('mouseleave',  onEnd);
    window.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('touchend',    onEnd);
    window.addEventListener('resize',      build);
  </script>
</body>
</html>
