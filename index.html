<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1c0600;
      font-family: 'Inter', sans-serif;
    }

    /* ── Content (revealed as powder clears) ── */
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none; pointer-events: none;
    }
    .date {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1;
      color: #fff;
    }
    .label {
      margin-top: 18px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 900; letter-spacing: 0.28em;
      text-transform: uppercase; color: #ffffff35;
    }
    .logo-wrap {
      position: fixed; bottom: clamp(32px,5vh,56px);
      left: 50%; transform: translateX(-50%);
      pointer-events: none;
    }
    .logo {
      font-size: clamp(28px,5vw,48px); font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg,#FF6B00,#FF3B3B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hint {
      position: fixed; bottom: clamp(90px,12vh,120px);
      left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 0.22em;
      text-transform: uppercase; color: #ffffff20; white-space: nowrap;
      pointer-events: none;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.8} }

    /* ── Canvas on top ── */
    #c {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

  <!-- Content beneath the powder -->
  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>
  <div class="logo-wrap"><div class="logo">vehob</div></div>
  <div class="hint">swipe to reveal</div>

  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H;

    // ── Offscreen coverage canvas (the powder bed) ────────────────────
    const cover = document.createElement('canvas');
    const cctx  = cover.getContext('2d');

    // ── Physics particles (launched, fly away, finite) ─────────────────
    const phys = [];
    const MAX_PHYS = 4000; // cap so it stays fast

    // ── Pointer state ─────────────────────────────────────────────────
    let pX = null, pY = null, pT = null;
    let vX = 0, vY = 0; // pointer velocity px/frame

    // ── Physics constants ─────────────────────────────────────────────
    const GRAVITY  = 0.018;
    const DAMPING  = 0.97;
    const DRIFT    = 0.013;

    const rand = (a, b) => Math.random() * (b - a) + a;

    // ── Build the powder coverage texture (3-D) ──────────────────────
    function buildCover() {
      W = canvas.width  = cover.width  = window.innerWidth;
      H = canvas.height = cover.height = window.innerHeight;

      // Warm spice base
      cctx.fillStyle = '#6B2400';
      cctx.fillRect(0, 0, W, H);

      // ── Layer 1: ambient occlusion — dark pockets ──
      for (let i = 0; i < 900; i++) {
        const x = rand(0,W), y = rand(0,H), r = rand(15,70);
        const g = cctx.createRadialGradient(x,y,0,x,y,r);
        g.addColorStop(0, `rgba(0,0,0,${rand(0.1,0.38)})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        cctx.fillStyle = g; cctx.beginPath(); cctx.arc(x,y,r,0,Math.PI*2); cctx.fill();
      }

      // ── Layer 2: raised dune highlights (light from top-left) ──
      for (let i = 0; i < 600; i++) {
        const x = rand(0,W), y = rand(0,H), r = rand(8,45);
        // Highlight offset toward light source (top-left)
        const g = cctx.createRadialGradient(x-r*0.4,y-r*0.4,0,x,y,r);
        g.addColorStop(0, `rgba(255,160,60,${rand(0.08,0.30)})`);
        g.addColorStop(0.5,`rgba(220,110,30,${rand(0.04,0.14)})`);
        g.addColorStop(1,  'rgba(180,80,10,0)');
        cctx.fillStyle = g; cctx.beginPath(); cctx.arc(x,y,r,0,Math.PI*2); cctx.fill();
      }

      // ── Layer 3: grain shadows (draw grains with drop shadow) ──
      cctx.save();
      cctx.shadowColor    = 'rgba(0,0,0,0.75)';
      cctx.shadowOffsetX  = 0.7;
      cctx.shadowOffsetY  = 1.0;
      cctx.shadowBlur     = 0.6;

      const numClusters = 150;
      for (let k = 0; k < numClusters; k++) {
        const cx = rand(0,W), cy = rand(0,H);
        const spread = rand(10,95);
        const count  = rand(100,450) | 0;
        for (let j = 0; j < count; j++) {
          const angle = rand(0,Math.PI*2);
          const d     = rand(0,spread) * Math.sqrt(Math.random());
          const x = cx + Math.cos(angle)*d;
          const y = cy + Math.sin(angle)*d;
          if (x<0||x>W||y<0||y>H) continue;
          const r  = rand(0.5,2.4);
          const R  = rand(140,255)|0, G = rand(35,120)|0;
          cctx.beginPath(); cctx.arc(x,y,r,0,Math.PI*2);
          cctx.fillStyle = `rgba(${R},${G},${rand(0,16)|0},${rand(0.5,1.0)})`;
          cctx.fill();
        }
      }
      cctx.restore();

      // ── Layer 4: grain specular highlights (tiny bright top-left dots) ──
      for (let i = 0; i < 18000; i++) {
        const x = rand(0,W), y = rand(0,H);
        const r = rand(0.3,1.0);
        // Bright highlight dot offset slightly top-left of a random grain pos
        cctx.beginPath();
        cctx.arc(x - rand(0,0.6), y - rand(0,0.6), r*0.45, 0, Math.PI*2);
        cctx.fillStyle = `rgba(255,${rand(180,230)|0},${rand(100,160)|0},${rand(0.08,0.35)})`;
        cctx.fill();
      }

      // ── Layer 5: micro rect dust ──
      for (let i = 0; i < 25000; i++) {
        cctx.fillStyle = `rgba(${rand(155,240)|0},${rand(45,105)|0},${rand(0,10)|0},${rand(0.12,0.5)})`;
        cctx.fillRect(rand(0,W), rand(0,H), rand(0.3,1.0), rand(0.3,1.0));
      }
    }

    // ── Erase powder + spawn physics particles ────────────────────────
    function swipeAt(x, y) {
      const speed  = Math.sqrt(vX*vX + vY*vY);
      const brushR = Math.max(18, Math.min(72, 28 + speed * 4));

      // Erase from coverage canvas
      cctx.globalCompositeOperation = 'destination-out';
      const g = cctx.createRadialGradient(x, y, 0, x, y, brushR);
      g.addColorStop(0,   'rgba(0,0,0,1)');
      g.addColorStop(0.55,'rgba(0,0,0,0.85)');
      g.addColorStop(1,   'rgba(0,0,0,0)');
      cctx.fillStyle = g;
      cctx.beginPath(); cctx.arc(x, y, brushR, 0, Math.PI*2); cctx.fill();
      cctx.globalCompositeOperation = 'source-over';

      if (speed < 0.4) return;

      // Swipe direction (normalized)
      const len  = Math.sqrt(vX*vX + vY*vY);
      const dirX = vX / len;
      const dirY = vY / len;

      // Number of particles scales with speed
      const count = Math.min(MAX_PHYS - phys.length, Math.floor(speed * 20 + 8));

      for (let i = 0; i < count; i++) {
        // Spawn inside brush radius
        const angle = rand(0, Math.PI * 2);
        const d     = rand(0, brushR * 0.85);

        // Fast = wide spray cone. Slow = narrow wisp.
        const coneAngle  = Math.min(Math.PI * 0.6, speed * 0.08);
        const launchAngle = Math.atan2(dirY, dirX) + rand(-coneAngle, coneAngle);
        const launchSpd  = speed * rand(0.45, 1.7);

        phys.push({
          x:  x + Math.cos(angle) * d,
          y:  y + Math.sin(angle) * d,
          vx: Math.cos(launchAngle) * launchSpd,
          vy: Math.sin(launchAngle) * launchSpd,
          r:  rand(0.5, 2.4),
          R:  rand(145, 255) | 0,
          G:  rand(38,  118) | 0,
          B:  rand(0,   18)  | 0,
          a:  rand(0.55, 1.0),
        });
      }
    }

    // ── Main loop ─────────────────────────────────────────────────────
    function loop() {
      ctx.clearRect(0, 0, W, H);

      // Draw powder bed
      ctx.drawImage(cover, 0, 0);

      // Update + draw physics particles
      for (let i = phys.length - 1; i >= 0; i--) {
        const p = phys[i];

        // Physics
        p.vy += GRAVITY;
        p.vx *= DAMPING;
        p.vy *= DAMPING;
        p.vx += (Math.random() - 0.5) * DRIFT;

        p.x += p.vx;
        p.y += p.vy;

        // Remove when off screen
        if (p.x < -6 || p.x > W+6 || p.y > H+6 || p.y < -180) {
          phys.splice(i, 1);
          continue;
        }

        // Radial gradient = 3D sphere look per flying grain
        const gr = ctx.createRadialGradient(
          p.x - p.r*0.35, p.y - p.r*0.35, 0,
          p.x, p.y, p.r
        );
        gr.addColorStop(0,   `rgba(${Math.min(255,p.R+80)},${Math.min(255,p.G+40)},${p.B+20},${p.a})`);
        gr.addColorStop(0.6, `rgba(${p.R},${p.G},${p.B},${p.a})`);
        gr.addColorStop(1,   `rgba(${Math.max(0,p.R-60)},${Math.max(0,p.G-30)},0,0)`);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = gr;
        ctx.fill();
      }

      requestAnimationFrame(loop);
    }

    // ── Pointer tracking ──────────────────────────────────────────────
    function onMove(x, y) {
      const now = performance.now();
      if (pX !== null) {
        const dt = Math.max(1, Math.min(60, now - pT));
        vX = (x - pX) / dt * 16.67; // scale to px/frame @60fps
        vY = (y - pY) / dt * 16.67;
        swipeAt(x, y);
      }
      pX = x; pY = y; pT = now;
    }

    function onEnd() {
      pX = pY = null;
      vX = vY = 0;
    }

    // Mouse
    window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    window.addEventListener('mouseup',   onEnd);
    window.addEventListener('mouseleave', onEnd);

    // Touch
    window.addEventListener('touchmove', e => {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    window.addEventListener('touchend',   onEnd);
    window.addEventListener('touchcancel', onEnd);

    window.addEventListener('resize', buildCover);

    // ── Boot ──────────────────────────────────────────────────────────
    buildCover();
    loop();
  </script>
</body>
</html>
