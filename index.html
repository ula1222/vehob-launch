<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1c0600;
      font-family: 'Inter', sans-serif;
    }
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none; pointer-events: none;
    }
    .date {
      font-size: clamp(48px,12vw,140px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1; color: #fff;
    }
    .label {
      margin-top: 18px; font-size: clamp(11px,1.6vw,15px);
      font-weight: 900; letter-spacing: 0.28em;
      text-transform: uppercase; color: #ffffff35;
    }
    .logo-wrap {
      position: fixed; bottom: clamp(32px,5vh,56px);
      left: 50%; transform: translateX(-50%); pointer-events: none;
    }
    .logo {
      font-size: clamp(28px,5vw,48px); font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg,#FF6B00,#FF3B3B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hint {
      position: fixed; bottom: clamp(90px,12vh,120px);
      left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 0.22em;
      text-transform: uppercase; color: #ffffff22; white-space: nowrap;
      pointer-events: none; animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.8} }
    #c { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>
  <div class="logo-wrap"><div class="logo">vehob</div></div>
  <div class="hint">swipe to reveal</div>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H;

    // offscreen coverage (the powder bed — erased permanently on swipe)
    const cover = document.createElement('canvas');
    const cctx  = cover.getContext('2d');

    // physics particles — finite, scatter and leave
    const phys   = [];
    const MAX_P  = 500;

    // pointer velocity
    let pX = null, pY = null, pT = null, vX = 0, vY = 0;

    // powder constants (light + floaty)
    const GRAVITY = 0.012;   // very low — powder hangs in air
    const DAMPING = 0.968;   // high air resistance
    const DRIFT   = 0.018;   // random sideways drift

    const rand = (a, b) => Math.random() * (b - a) + a;

    // ── Coverage texture — built once ─────────────────────────────────
    function buildCover() {
      W = canvas.width  = cover.width  = window.innerWidth;
      H = canvas.height = cover.height = window.innerHeight;

      // Base warm powder color
      cctx.fillStyle = '#7A2C00';
      cctx.fillRect(0, 0, W, H);

      // Soft tonal variation — subtle dunes
      for (let i = 0; i < 600; i++) {
        const x = rand(0,W), y = rand(0,H), r = rand(20,90);
        const g = cctx.createRadialGradient(x,y,0,x,y,r);
        const dark = Math.random() > 0.5;
        g.addColorStop(0, dark
          ? `rgba(0,0,0,${rand(0.06,0.22)})`
          : `rgba(255,140,40,${rand(0.04,0.18)})`);
        g.addColorStop(1, 'rgba(0,0,0,0)');
        cctx.fillStyle = g;
        cctx.beginPath(); cctx.arc(x,y,r,0,Math.PI*2); cctx.fill();
      }

      // Grain layer — WITH drop shadow for 3D depth
      cctx.save();
      cctx.shadowColor   = 'rgba(0,0,0,0.9)';
      cctx.shadowOffsetX = 0.8;
      cctx.shadowOffsetY = 1.1;
      cctx.shadowBlur    = 0.4;

      // Clustered grains (uneven density)
      for (let k = 0; k < 130; k++) {
        const cx = rand(0,W), cy = rand(0,H), spread = rand(8,85);
        const n  = rand(80,380) | 0;
        for (let j = 0; j < n; j++) {
          const a = rand(0,Math.PI*2), d = rand(0,spread)*Math.sqrt(Math.random());
          const x = cx+Math.cos(a)*d, y = cy+Math.sin(a)*d;
          if (x<0||x>W||y<0||y>H) continue;
          cctx.beginPath();
          cctx.arc(x, y, rand(0.5,2.0), 0, Math.PI*2);
          cctx.fillStyle = `rgba(${rand(145,255)|0},${rand(40,120)|0},${rand(0,14)|0},${rand(0.5,1.0)})`;
          cctx.fill();
        }
      }
      cctx.restore();

      // Specular pass — tiny bright dots offset top-left (simulates light catching grain edges)
      for (let i = 0; i < 12000; i++) {
        const x = rand(0,W), y = rand(0,H), r = rand(0.2,0.7);
        cctx.beginPath();
        cctx.arc(x-0.4, y-0.5, r, 0, Math.PI*2);
        cctx.fillStyle = `rgba(255,${rand(170,220)|0},${rand(80,140)|0},${rand(0.06,0.28)})`;
        cctx.fill();
      }

      // Fine micro-dust fill
      for (let i = 0; i < 20000; i++) {
        cctx.fillStyle = `rgba(${rand(150,240)|0},${rand(50,110)|0},0,${rand(0.1,0.45)})`;
        cctx.fillRect(rand(0,W), rand(0,H), rand(0.3,0.9), rand(0.3,0.9));
      }
    }

    // ── Swipe: erase coverage + spawn powder particles ────────────────
    function swipeAt(x, y) {
      const speed  = Math.sqrt(vX*vX + vY*vY);
      const brushR = Math.max(16, Math.min(60, 22 + speed * 3.5));

      // Erase from bed
      cctx.globalCompositeOperation = 'destination-out';
      const g = cctx.createRadialGradient(x, y, 0, x, y, brushR);
      g.addColorStop(0,    'rgba(0,0,0,1)');
      g.addColorStop(0.5,  'rgba(0,0,0,0.9)');
      g.addColorStop(1,    'rgba(0,0,0,0)');
      cctx.fillStyle = g;
      cctx.beginPath(); cctx.arc(x, y, brushR, 0, Math.PI*2); cctx.fill();
      cctx.globalCompositeOperation = 'source-over';

      if (speed < 0.3) return;

      const len  = Math.sqrt(vX*vX + vY*vY);
      const dirX = vX/len, dirY = vY/len;
      const count = Math.min(MAX_P - phys.length, Math.floor(speed * 14 + 5) | 0);
      const cone  = Math.min(Math.PI * 0.65, 0.3 + speed * 0.07);

      for (let i = 0; i < count; i++) {
        const a   = rand(0, Math.PI*2);
        const d   = rand(0, brushR * 0.8);
        const la  = Math.atan2(dirY, dirX) + rand(-cone, cone);
        const spd = speed * rand(0.35, 1.6);

        phys.push({
          x:  x + Math.cos(a)*d,
          y:  y + Math.sin(a)*d,
          vx: Math.cos(la)*spd,
          vy: Math.sin(la)*spd - rand(0, speed*0.25), // upward billow
          r:  rand(0.4, 1.8),
          R:  rand(180,255)|0,
          G:  rand(55,130)|0,
          B:  rand(0,12)|0,
          a:  rand(0.5, 0.95),
        });
      }
    }

    // ── Main loop ─────────────────────────────────────────────────────
    function loop() {
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(cover, 0, 0);

      // Physics particles — drawn as flat fast circles (no gradient per frame)
      ctx.save();
      ctx.shadowColor   = 'rgba(0,0,0,0.55)';
      ctx.shadowOffsetX = 0.5;
      ctx.shadowOffsetY = 0.7;
      ctx.shadowBlur    = 1.2;

      for (let i = phys.length-1; i >= 0; i--) {
        const p = phys[i];

        p.vy += GRAVITY;
        p.vx *= DAMPING; p.vy *= DAMPING;
        p.vx += (Math.random()-0.5)*DRIFT;
        p.x  += p.vx; p.y  += p.vy;

        if (p.x<-8||p.x>W+8||p.y>H+8||p.y<-220) { phys.splice(i,1); continue; }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${p.R},${p.G},${p.B},${p.a})`;
        ctx.fill();
      }
      ctx.restore();

      requestAnimationFrame(loop);
    }

    // ── Input ─────────────────────────────────────────────────────────
    function onMove(x, y) {
      const now = performance.now();
      if (pX !== null) {
        const dt = Math.max(1, Math.min(50, now-pT));
        vX = (x-pX)/dt*16.67;
        vY = (y-pY)/dt*16.67;
        swipeAt(x, y);
      }
      pX=x; pY=y; pT=now;
    }
    function onEnd() { pX=pY=null; vX=vY=0; }

    window.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
    window.addEventListener('mouseup',    onEnd);
    window.addEventListener('mouseleave', onEnd);
    window.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });
    window.addEventListener('touchend',   onEnd);
    window.addEventListener('resize',     buildCover);

    buildCover();
    loop();
  </script>
</body>
</html>
