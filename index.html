<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Canvas (particles + mask) ── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* ── Main layout ── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    /* ── Date ── */
    .date {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
    }

    /* ── Label ── */
    .label {
      margin-top: 18px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 900;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff30;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: fixed;
      bottom: clamp(32px, 5vh, 56px);
      left: 50%;
      transform: translateX(-50%);
    }

    .logo {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #FF6B00 0%, #FF3B3B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* hint */
    .hint {
      position: fixed;
      bottom: clamp(90px, 12vh, 120px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #ffffff18;
      white-space: nowrap;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>

  <canvas id="dust"></canvas>

  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>

  <div class="logo-wrap">
    <div class="logo">vehob</div>
  </div>

  <div class="hint">swipe to reveal</div>

  <script>
    // ── Setup ─────────────────────────────────────────────────────────
    const canvas = document.getElementById('dust');
    const ctx    = canvas.getContext('2d');
    let W, H, particles, animId;

    // Offscreen mask: black = covered, transparent hole = revealed
    const mask  = document.createElement('canvas');
    const mctx  = mask.getContext('2d');

    const COLORS      = ['#FF5500','#FF6B00','#E84800','#FF4000','#CC3700','#FF7020','#D94400','#FF4500','#C23300','#FF5200'];
    const COUNT       = 8000;
    const REVEAL_R    = 120;   // radius of reveal brush
    const REPEL_R     = 110;   // physics repulsion radius
    const REPEL_FORCE = 5.0;
    const FRICTION    = 0.78;  // high friction — particles stop quickly, stay put

    const pointer = { x: -9999, y: -9999, active: false };

    // ── Resize ────────────────────────────────────────────────────────
    function resize() {
      W = canvas.width = mask.width = window.innerWidth;
      H = canvas.height = mask.height = window.innerHeight;
      // Fill mask solid black — everything covered
      mctx.globalCompositeOperation = 'source-over';
      mctx.fillStyle = '#000';
      mctx.fillRect(0, 0, W, H);
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    // ── Particles ─────────────────────────────────────────────────────
    function makeParticle() {
      return {
        x:   rand(0, W),
        y:   rand(0, H),
        r:   rand(0.2, 1.1),  // tiny — real dust grain size
        evx: 0,
        evy: 0,
        baseAlpha: rand(0.4, 1.0),
        color:     COLORS[Math.floor(Math.random() * COLORS.length)],
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: COUNT }, makeParticle);
    }

    // ── Reveal brush — cuts a transparent hole in the mask ────────────
    function revealAt(x, y) {
      mctx.globalCompositeOperation = 'destination-out';
      const g = mctx.createRadialGradient(x, y, 0, x, y, REVEAL_R);
      g.addColorStop(0,   'rgba(0,0,0,1)');
      g.addColorStop(0.5, 'rgba(0,0,0,0.85)');
      g.addColorStop(1,   'rgba(0,0,0,0)');
      mctx.fillStyle = g;
      mctx.beginPath();
      mctx.arc(x, y, REVEAL_R, 0, Math.PI * 2);
      mctx.fill();
      mctx.globalCompositeOperation = 'source-over';
    }

    // ── Draw loop ─────────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Physics — particles are STATIC, only move when repelled
      particles.forEach(p => {
        if (pointer.active) {
          const dx   = p.x - pointer.x;
          const dy   = p.y - pointer.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < REPEL_R && dist > 0) {
            const force = (1 - dist / REPEL_R) * REPEL_FORCE;
            p.evx += (dx / dist) * force;
            p.evy += (dy / dist) * force;
          }
        }

        // Friction stops them quickly — they settle where they land
        p.evx *= FRICTION;
        p.evy *= FRICTION;
        p.x   += p.evx;
        p.y   += p.evy;

        // Keep in bounds
        if (p.x < 0)  p.x = 0;
        if (p.x > W)  p.x = W;
        if (p.y < 0)  p.y = 0;
        if (p.y > H)  p.y = H;
      });

      // 1. Draw the black mask (covered areas stay dark, holes are transparent)
      ctx.drawImage(mask, 0, 0);

      // 2. Draw particles ONLY on top of covered (opaque) mask areas
      ctx.globalCompositeOperation = 'source-atop';
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.floor(p.baseAlpha * 255).toString(16).padStart(2, '0');
        ctx.fill();
      });
      ctx.globalCompositeOperation = 'source-over';

      animId = requestAnimationFrame(draw);
    }

    // ── Init ──────────────────────────────────────────────────────────
    init();
    draw();

    // ── Pointer events ────────────────────────────────────────────────
    window.addEventListener('mousemove', e => {
      pointer.x = e.clientX;
      pointer.y = e.clientY;
      pointer.active = true;
      revealAt(e.clientX, e.clientY);
    });
    window.addEventListener('mouseleave', () => { pointer.active = false; });

    window.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.active = true;
      revealAt(t.clientX, t.clientY);
    }, { passive: true });
    window.addEventListener('touchend',  () => { pointer.active = false; });

    window.addEventListener('resize', () => {
      resize();
      particles.forEach(p => { p.x = rand(0, W); p.y = rand(0, H); });
    });
  </script>
</body>
</html>
