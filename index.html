<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a0400;
      font-family: 'Inter', sans-serif;
    }
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none; pointer-events: none;
    }
    .date {
      font-size: clamp(48px,12vw,140px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1; color: #fff;
    }
    .label {
      margin-top: 18px; font-size: clamp(11px,1.6vw,15px);
      font-weight: 900; letter-spacing: 0.28em;
      text-transform: uppercase; color: #ffffff35;
    }
    .logo-wrap {
      position: fixed; bottom: clamp(32px,5vh,56px);
      left: 50%; transform: translateX(-50%); pointer-events: none;
    }
    .logo {
      font-size: clamp(28px,5vw,48px); font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg,#FF6B00,#FF3B3B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hint {
      position: fixed; bottom: clamp(90px,12vh,120px);
      left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 0.22em;
      text-transform: uppercase; color: #ffffff22; white-space: nowrap;
      pointer-events: none; animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.2} 50%{opacity:.8} }
    #c { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>
  <div class="logo-wrap"><div class="logo">vehob</div></div>
  <div class="hint">swipe to reveal</div>
  <canvas id="c"></canvas>

  <script>
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');
    let W, H, cols, rows, N, imgData;

    // ── Grid ─────────────────────────────────────────────────────────
    const GRID       = 3;    // px per cell
    const PUSH_R     = 65;   // push brush radius px
    const PUSH_FORCE = 2.2;  // how hard cursor pushes
    const FRICTION   = 0.89; // velocity decay
    const FLOW       = 0.18; // height transfer per frame (lower = less clean channel)
    const NORM_SCALE = 7;    // normal gradient — 3D depth intensity
    const GRAIN_NS   = 0.5;  // per-grain normal jitter
    const MIN_H      = 0.22; // powder never fully disappears — no black void

    let H_cur, H_nxt, VX, VY, GR, GG, GB, GNX, GNY;

    // pointer velocity (px/frame)
    let pX = null, pY = null, pT = null;
    let vX = 0, vY = 0;

    const rand = (a, b) => Math.random() * (b - a) + a;

    // ── Init height map ───────────────────────────────────────────────
    function build() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cols = Math.ceil(W / GRID);
      rows = Math.ceil(H / GRID);
      N    = cols * rows;

      H_cur = new Float32Array(N);
      H_nxt = new Float32Array(N);
      VX    = new Float32Array(N);
      VY    = new Float32Array(N);
      GR    = new Uint8Array(N);   // grain red
      GG    = new Uint8Array(N);   // grain green
      GB    = new Uint8Array(N);   // grain blue
      GNX   = new Float32Array(N); // baked normal noise X
      GNY   = new Float32Array(N); // baked normal noise Y

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const i = r * cols + c;
          // Macro dune shape via sine waves
          const dune =
            Math.sin(c * 0.055 + r * 0.040) * 0.13 +
            Math.sin(c * 0.110 - r * 0.075) * 0.09 +
            Math.sin(c * 0.028 + r * 0.100) * 0.05;
          H_cur[i] = 1.0 + dune + rand(-0.04, 0.04);

          // Warm powder colors — bright orange/red range
          GR[i]  = rand(185, 255) | 0;
          GG[i]  = rand(65,  145) | 0;
          GB[i]  = rand(0,   18)  | 0;

          // Baked per-grain normal noise for powder texture
          GNX[i] = rand(-1, 1);
          GNY[i] = rand(-1, 1);
        }
      }

      imgData = ctx.createImageData(W, H);
    }

    // ── Push: chaotic scatter, not a clean eraser line ────────────────
    function push(px, py) {
      const speed = Math.sqrt(vX*vX + vY*vY);
      if (speed < 0.1) return;

      const cx   = (px / GRID) | 0;
      const cy   = (py / GRID) | 0;
      const br   = (PUSH_R / GRID) | 0;
      const slen = Math.max(speed, 0.001);
      const sdx  = vX / slen, sdy = vY / slen;

      for (let dy = -br; dy <= br; dy++) {
        for (let dx = -br; dx <= br; dx++) {
          const nc = cx + dx, nr = cy + dy;
          if (nc < 1 || nc >= cols-1 || nr < 1 || nr >= rows-1) continue;
          const d2 = dx*dx + dy*dy;
          if (d2 >= br*br || d2 < 0.5) continue;

          // ── Random skip: ~48% of grains don't get pushed ──
          if (Math.random() > 0.52) continue;

          const d       = Math.sqrt(d2);
          const falloff = (1 - d/br) * (1 - d/br);
          const rdx     = dx/d, rdy = dy/d;

          // ── Large random angle deviation per grain ──
          const angleNoise = (Math.random() - 0.5) * 1.4; // ±0.7 rad
          const cos = Math.cos(angleNoise), sin = Math.sin(angleNoise);
          const noiseX = sdx*cos - sdy*sin;
          const noiseY = sdx*sin + sdy*cos;

          // Mix: swipe + radial + pure random
          const pdx = noiseX*0.45 + rdx*0.25 + (Math.random()-0.5)*0.6;
          const pdy = noiseY*0.45 + rdy*0.25 + (Math.random()-0.5)*0.6;

          const f   = falloff * PUSH_FORCE * (0.4 + Math.random()*1.0) * Math.min(speed*0.3+0.5, 2.5);
          const idx = nr * cols + nc;
          VX[idx] += pdx * f;
          VY[idx] += pdy * f;
        }
      }

      // ── Turbulence ring beyond brush — dusting cloud effect ──
      const turR = (br * 1.7) | 0;
      for (let dy = -turR; dy <= turR; dy++) {
        for (let dx = -turR; dx <= turR; dx++) {
          const nc = cx+dx, nr = cy+dy;
          if (nc<1||nc>=cols-1||nr<1||nr>=rows-1) continue;
          const d2 = dx*dx+dy*dy;
          if (d2 < br*br || d2 >= turR*turR) continue;
          if (Math.random() > 0.10) continue; // sparse — only 10% of ring cells
          const idx = nr*cols+nc;
          VX[idx] += (Math.random()-0.5) * speed * 0.18;
          VY[idx] += (Math.random()-0.5) * speed * 0.18;
        }
      }
    }

    // ── Physics step: height flows between cells ──────────────────────
    function step() {
      H_nxt.set(H_cur);

      for (let r = 1; r < rows-1; r++) {
        for (let c = 1; c < cols-1; c++) {
          const i = r * cols + c;

          VX[i] *= FRICTION;
          VY[i] *= FRICTION;

          const vx = VX[i], vy = VY[i];
          const spd = Math.sqrt(vx*vx + vy*vy);
          if (spd < 0.005) continue;

          const h  = H_cur[i];
          const fx = Math.min(h * FLOW * Math.abs(vx), h * 0.28);
          const fy = Math.min(h * FLOW * Math.abs(vy), h * 0.28);

          if (fx > 0.0001) {
            const tc = vx > 0 ? c+1 : c-1;
            H_nxt[i]         -= fx;
            H_nxt[r*cols+tc] += fx;
          }
          if (fy > 0.0001) {
            const tr = vy > 0 ? r+1 : r-1;
            H_nxt[i]         -= fy;
            H_nxt[tr*cols+c] += fy;
          }

          // Random scatter: disturbed cells shed tiny amount in all 4 dirs
          if (spd > 0.3) {
            const shed = H_cur[i] * 0.012 * Math.random();
            H_nxt[i]            -= shed * 4;
            H_nxt[i+1]          += shed;
            H_nxt[i-1]          += shed;
            H_nxt[i+cols]       += shed;
            H_nxt[i-cols]       += shed;
          }
        }
      }

      // Enforce minimum — powder never fully vanishes (no black eraser hole)
      for (let i = 0; i < N; i++) {
        if (H_nxt[i] < MIN_H) H_nxt[i] = MIN_H;
      }

      const tmp = H_cur; H_cur = H_nxt; H_nxt = tmp;
    }

    // ── Render: height map → lit 3D powder pixels ────────────────────
    function render() {
      const data = imgData.data;

      // Light from top-left
      const lx = -0.5, ly = -0.75, lz = 0.9;
      const ll  = Math.sqrt(lx*lx + ly*ly + lz*lz);
      const nlx = lx/ll, nly = ly/ll, nlz = lz/ll;

      for (let r = 1; r < rows-1; r++) {
        for (let c = 1; c < cols-1; c++) {
          const i = r * cols + c;
          const h = H_cur[i];

          // Surface normal from height gradient + per-grain noise
          const gx = (H_cur[i+1]    - H_cur[i-1])    * NORM_SCALE + GNX[i] * GRAIN_NS;
          const gy = (H_cur[i+cols] - H_cur[i-cols]) * NORM_SCALE + GNY[i] * GRAIN_NS;
          const gz = 1.0;
          const gl  = Math.sqrt(gx*gx + gy*gy + gz*gz);
          const nx  = -gx/gl, ny = -gy/gl, nz = gz/gl;

          // Diffuse (Lambert)
          const ndl   = nx*nlx + ny*nly + nz*nlz;
          const light = 0.22 + 0.78 * Math.max(0, ndl);

          // Specular (Blinn-Phong — powder has soft sheen)
          const hx = nlx, hy = nly, hz = nlz + 1;
          const hl  = Math.sqrt(hx*hx + hy*hy + hz*hz);
          const sp  = Math.pow(Math.max(0, nx*(hx/hl)+ny*(hy/hl)+nz*(hz/hl)), 22) * 0.7;

          // Height boost: piled powder is brighter/raised
          const hb = h > 1.05 ? 1 + (h-1)*1.0 : 1.0;

          const cl  = v => v < 0 ? 0 : v > 255 ? 255 : v | 0;
          const R   = cl(GR[i] * light * hb + sp * 255);
          const G   = cl(GG[i] * light * hb + sp * 210);
          const B   = cl(GB[i] * light * hb + sp * 170);
          // Where powder is pushed thin, content shows through
          const A   = cl(Math.min(h * 1.15, 1.0) * 255);

          const px0 = c * GRID, py0 = r * GRID;
          for (let dy = 0; dy < GRID; dy++) {
            let pi = ((py0+dy) * W + px0) * 4;
            for (let dx = 0; dx < GRID; dx++, pi += 4) {
              data[pi]   = R;
              data[pi+1] = G;
              data[pi+2] = B;
              data[pi+3] = A;
            }
          }
        }
      }

      ctx.putImageData(imgData, 0, 0);
    }

    // ── Loop ──────────────────────────────────────────────────────────
    function loop() { step(); render(); requestAnimationFrame(loop); }

    build();
    loop();

    // ── Input ─────────────────────────────────────────────────────────
    function onMove(x, y) {
      const now = performance.now();
      if (pX !== null) {
        const dt = Math.max(1, Math.min(50, now - pT));
        vX = (x - pX) / dt * 16.67;
        vY = (y - pY) / dt * 16.67;
        push(x, y);
      }
      pX = x; pY = y; pT = now;
    }
    function onEnd() { pX = pY = null; vX = vY = 0; }

    window.addEventListener('mousemove',   e => onMove(e.clientX, e.clientY));
    window.addEventListener('mouseup',     onEnd);
    window.addEventListener('mouseleave',  onEnd);
    window.addEventListener('touchmove',   e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    window.addEventListener('touchend',    onEnd);
    window.addEventListener('resize',      build);
  </script>
</body>
</html>
