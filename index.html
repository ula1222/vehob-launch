<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .date {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
    }

    .label {
      margin-top: 18px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 900;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff30;
    }

    .logo-wrap {
      position: fixed;
      bottom: clamp(32px, 5vh, 56px);
      left: 50%;
      transform: translateX(-50%);
    }

    .logo {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #FF6B00 0%, #FF3B3B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hint {
      position: fixed;
      bottom: clamp(90px, 12vh, 120px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #ffffff18;
      white-space: nowrap;
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.9} }
  </style>
</head>
<body>

  <canvas id="dust"></canvas>

  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>

  <div class="logo-wrap">
    <div class="logo">vehob</div>
  </div>

  <div class="hint">swipe to reveal</div>

  <script>
    const canvas = document.getElementById('dust');
    const ctx    = canvas.getContext('2d');
    let W, H, animId;

    // ── Grid ─────────────────────────────────────────────────────────
    const GRID     = 3;    // px per cell — finer = more detail
    const BRUSH_R  = 42;   // reveal brush radius (px)
    const STRENGTH = 0.22; // how much sand removed per frame
    const PILE     = 0.14; // sand piles at brush edge

    let cols, rows;
    let heights;   // Float32Array — 0 (cleared) to 1+ (piled)
    let grainR, grainG, grainB; // pre-baked per-cell color jitter
    let imageData;

    const pointer = { x: -9999, y: -9999, active: false };

    function rand(a, b) { return Math.random() * (b - a) + a; }

    // ── Init grid ────────────────────────────────────────────────────
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cols = Math.ceil(W / GRID);
      rows = Math.ceil(H / GRID);

      heights = new Float32Array(cols * rows);
      grainR  = new Uint8Array(cols * rows);
      grainG  = new Uint8Array(cols * rows);
      grainB  = new Uint8Array(cols * rows);

      // Build low-frequency dune bumps using summed sine waves
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const i = row * cols + col;
          const dune =
            Math.sin(col * 0.07 + row * 0.05) * 0.12 +
            Math.sin(col * 0.13 - row * 0.09) * 0.08 +
            Math.sin(col * 0.03 + row * 0.11) * 0.06;
          heights[i] = 0.92 + dune + rand(-0.06, 0.06);
          grainR[i] = rand(155, 255) | 0;
          grainG[i] = rand(40,  110) | 0;
          grainB[i] = rand(0,   22)  | 0;
        }
      }

      imageData = ctx.createImageData(W, H);
    }

    // ── Brush: remove sand + pile at edge ────────────────────────────
    function applyBrush(px, py) {
      const cx  = px / GRID;
      const cy  = py / GRID;
      const br  = BRUSH_R / GRID;
      const br2 = br * 1.65;
      const ceil = Math.ceil(br2);

      for (let dy = -ceil; dy <= ceil; dy++) {
        for (let dx = -ceil; dx <= ceil; dx++) {
          const nx = (cx + dx) | 0;
          const ny = (cy + dy) | 0;
          if (nx < 1 || nx >= cols - 1 || ny < 1 || ny >= rows - 1) continue;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const idx  = ny * cols + nx;

          if (dist < br) {
            // Cosine falloff — smooth center removal
            const f = Math.cos((dist / br) * Math.PI * 0.5);
            heights[idx] = Math.max(0, heights[idx] - f * STRENGTH);
          } else if (dist < br2) {
            // Pile at edge — sand displaced outward
            const t    = (dist - br) / (br2 - br);
            const edge = (1 - t) * (1 - t);
            heights[idx] = Math.min(1.6, heights[idx] + edge * PILE);
          }
        }
      }
    }

    // ── Render height map with 3-D lighting ──────────────────────────
    function render() {
      const data = imageData.data;

      // Light direction (top-left, angled)
      const LX = -0.45, LY = -0.75, LZ = 0.85;
      const LL = Math.sqrt(LX*LX + LY*LY + LZ*LZ);
      const nlx = LX/LL, nly = LY/LL, nlz = LZ/LL;

      for (let row = 1; row < rows - 1; row++) {
        for (let col = 1; col < cols - 1; col++) {
          const idx = row * cols + col;
          const h   = heights[idx];

          if (h <= 0.01) {
            // Transparent — content shows through
            const px0 = col * GRID, py0 = row * GRID;
            for (let dy = 0; dy < GRID; dy++) {
              let pi = ((py0 + dy) * W + px0) * 4;
              for (let dx = 0; dx < GRID; dx++, pi += 4)
                data[pi+3] = 0;
            }
            continue;
          }

          // Surface normal — stronger gradient scale = more dramatic 3D
          const gx = (heights[idx + 1]    - heights[idx - 1])    * 7.0;
          const gy = (heights[idx + cols] - heights[idx - cols]) * 7.0;
          const gz = 1.0;
          const glen = Math.sqrt(gx*gx + gy*gy + gz*gz);
          const nx = -gx/glen, ny = -gy/glen, nz = gz/glen;

          // Diffuse (Lambertian)
          const ndotl  = nx*nlx + ny*nly + nz*nlz;
          const diffuse = Math.max(0, ndotl);
          const light   = 0.18 + 0.82 * diffuse;

          // Specular (Blinn-Phong)
          const hx = nlx, hy = nly, hz = nlz + 1;
          const hlen = Math.sqrt(hx*hx + hy*hy + hz*hz);
          const spec = Math.pow(Math.max(0, nx*(hx/hlen) + ny*(hy/hlen) + nz*(hz/hlen)), 32) * 0.9;

          // Soft shadow — darken cells that slope away from light
          const shadow = Math.max(0, Math.min(1, 0.6 + ndotl * 0.9));

          // Pile areas catch more light (raised = brighter highlight)
          const heightBoost = h > 1.0 ? 1 + (h - 1.0) * 0.8 : 1.0;

          const clamp = v => v < 0 ? 0 : v > 255 ? 255 : v | 0;
          const r = clamp(grainR[idx] * light * heightBoost * shadow + spec * 255);
          const g = clamp(grainG[idx] * light * heightBoost * shadow + spec * 210);
          const b = clamp(grainB[idx] * light * heightBoost * shadow + spec * 170);
          const a = Math.min(255, (Math.min(h, 1) * 255) | 0);

          // Write GRID×GRID pixel block
          const px0 = col * GRID, py0 = row * GRID;
          for (let dy = 0; dy < GRID; dy++) {
            let pi = ((py0 + dy) * W + px0) * 4;
            for (let dx = 0; dx < GRID; dx++, pi += 4) {
              data[pi]   = r;
              data[pi+1] = g;
              data[pi+2] = b;
              data[pi+3] = a;
            }
          }
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }

    // ── Loop ─────────────────────────────────────────────────────────
    function draw() {
      render();
      animId = requestAnimationFrame(draw);
    }

    resize();
    draw();

    // ── Pointer ──────────────────────────────────────────────────────
    window.addEventListener('mousemove', e => {
      pointer.x = e.clientX; pointer.y = e.clientY; pointer.active = true;
      applyBrush(e.clientX, e.clientY);
    });
    window.addEventListener('mouseleave', () => { pointer.active = false; });

    window.addEventListener('touchmove', e => {
      const t = e.touches[0];
      pointer.x = t.clientX; pointer.y = t.clientY; pointer.active = true;
      applyBrush(t.clientX, t.clientY);
    }, { passive: true });
    window.addEventListener('touchend', () => { pointer.active = false; });

    window.addEventListener('resize', () => { resize(); });
  </script>
</body>
</html>
