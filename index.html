<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── Canvas (particles) ── */
    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      transition: opacity 1.2s ease;
    }
    canvas.hidden { opacity: 0; }

    /* ── Main layout ── */
    .stage {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      user-select: none;
    }

    /* ── Date ── */
    .date {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    /* ── Label ── */
    .label {
      margin-top: 18px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 900;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #ffffff30;
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
    }

    /* ── Logo ── */
    .logo-wrap {
      position: fixed;
      bottom: clamp(32px, 5vh, 56px);
      left: 50%;
      transform: translateX(-50%);
      opacity: 0;
      animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.8s forwards;
    }

    .logo {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #FF6B00 0%, #FF3B3B 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="dust"></canvas>

  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>

  <div class="logo-wrap">
    <div class="logo">vehob</div>
  </div>

  <script>
    // ── Particle system ──────────────────────────────────────────────
    const canvas  = document.getElementById('dust');
    const ctx     = canvas.getContext('2d');
    let W, H, particles, animId;
    let dismissed = false;

    const COUNT  = 2000;
    const COLORS = ['#FF5500','#FF6B00','#E84800','#FF4000','#CC3700','#FF7020','#D94400'];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function rand(min, max) { return Math.random() * (max - min) + min; }

    function makeParticle(fromBottom) {
      return {
        x:          rand(0, W),
        y:          fromBottom ? H + rand(0, 8) : rand(0, H),
        r:          rand(0.2, 0.9),
        vx:         rand(-0.08, 0.08),
        vy:         rand(-0.18, -0.03),
        baseAlpha:  rand(0.25, 0.75),
        color:      COLORS[Math.floor(Math.random() * COLORS.length)],
        twinkle:    rand(0, Math.PI * 2),
        twinkleSpeed: rand(0.003, 0.012),
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: COUNT }, () => makeParticle(false));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      if (dismissed) return;

      particles.forEach((p, i) => {
        p.twinkle += p.twinkleSpeed;
        p.x       += p.vx;
        p.y       += p.vy;

        if (p.y < -2) {
          particles[i] = makeParticle(true);
          return;
        }

        const a = p.baseAlpha * (0.7 + 0.3 * Math.sin(p.twinkle));
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color + Math.floor(a * 255).toString(16).padStart(2, '0');
        ctx.fill();
      });

      animId = requestAnimationFrame(draw);
    }

    function dismiss() {
      if (dismissed) return;
      dismissed = true;
      canvas.classList.add('hidden');
      cancelAnimationFrame(animId);
    }

    // ── Init ────────────────────────────────────────────────────────
    init();
    draw();

    // Dismiss on any interaction
    window.addEventListener('scroll',     dismiss, { passive: true });
    window.addEventListener('touchstart', dismiss, { passive: true });
    window.addEventListener('touchmove',  dismiss, { passive: true });
    window.addEventListener('click',      dismiss);
    window.addEventListener('keydown',    dismiss);

    window.addEventListener('resize', () => {
      resize();
      if (!dismissed) {
        particles.forEach(p => {
          p.x = rand(0, W);
          p.y = rand(0, H);
        });
      }
    });
  </script>
</body>
</html>
