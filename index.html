<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vehob — coming soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .stage {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      user-select: none;
    }
    .date {
      font-size: clamp(48px, 12vw, 140px);
      font-weight: 900; letter-spacing: -0.03em; line-height: 1; color: #fff;
    }
    .label {
      margin-top: 18px;
      font-size: clamp(11px, 1.6vw, 15px);
      font-weight: 900; letter-spacing: 0.28em;
      text-transform: uppercase; color: #ffffff30;
    }
    .logo-wrap {
      position: fixed; bottom: clamp(32px,5vh,56px);
      left: 50%; transform: translateX(-50%);
    }
    .logo {
      font-size: clamp(28px,5vw,48px); font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(90deg,#FF6B00 0%,#FF3B3B 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hint {
      position: fixed; bottom: clamp(90px,12vh,120px);
      left: 50%; transform: translateX(-50%);
      font-size: 11px; font-weight: 900; letter-spacing: 0.22em;
      text-transform: uppercase; color: #ffffff22; white-space: nowrap;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.25} 50%{opacity:.85} }
  </style>
</head>
<body>
  <canvas id="dust"></canvas>
  <div class="stage">
    <div class="date">05.05.2026</div>
    <div class="label">Launch Date</div>
  </div>
  <div class="logo-wrap"><div class="logo">vehob</div></div>
  <div class="hint">swipe to reveal</div>

  <script>
    const canvas = document.getElementById('dust');
    const ctx    = canvas.getContext('2d');
    let W, H, cols, rows, N, imgData;

    // ── tunables ──────────────────────────────────────────────────────
    const GRID         = 2;    // 2 px per grain — fine sand texture
    const REPEL_R      = 85;   // repulsion radius px
    const REPEL_FORCE  = 5.0;  // push strength
    const FRICTION     = 0.84; // velocity decay
    const FLOW         = 0.45; // height transfer fraction per frame
    const NORM_SCALE   = 11;   // normal gradient strength → 3D depth
    const GRAIN_NOISE  = 0.55; // per-grain normal jitter (grain texture)

    // typed arrays — all grain data
    let H_cur, H_nxt;          // height field (Float32)
    let VX, VY;                // velocity (Float32)
    let GR, GG, GB;            // baked color (Uint8)
    let NX, NY;                // baked normal noise (Float32, range ±1)

    const ptr = { x: -9999, y: -9999, on: false };
    const rand = (a, b) => Math.random() * (b - a) + a;

    // ── init ──────────────────────────────────────────────────────────
    function build() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cols = Math.ceil(W / GRID);
      rows = Math.ceil(H / GRID);
      N    = cols * rows;

      H_cur = new Float32Array(N);
      H_nxt = new Float32Array(N);
      VX    = new Float32Array(N);
      VY    = new Float32Array(N);
      GR    = new Uint8Array(N);
      GG    = new Uint8Array(N);
      GB    = new Uint8Array(N);
      NX    = new Float32Array(N);
      NY    = new Float32Array(N);

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const i = r * cols + c;
          // dune macro-shape
          const d =
            Math.sin(c * 0.055 + r * 0.038) * 0.14 +
            Math.sin(c * 0.112 - r * 0.071) * 0.09 +
            Math.sin(c * 0.029 + r * 0.095) * 0.06;
          H_cur[i] = 0.92 + d + rand(-0.04, 0.04);

          // grain color — warm orange/rust range with variation
          GR[i] = rand(145, 252) | 0;
          GG[i] = rand(35,  108) | 0;
          GB[i] = rand(0,   18)  | 0;

          // per-grain normal perturbation (baked once, gives grain texture)
          NX[i] = rand(-1, 1);
          NY[i] = rand(-1, 1);
        }
      }

      imgData = ctx.createImageData(W, H);
    }

    // ── repulsion ─────────────────────────────────────────────────────
    function repel(px, py) {
      const cx = (px / GRID) | 0;
      const cy = (py / GRID) | 0;
      const br = (REPEL_R / GRID) | 0;

      for (let dy = -br; dy <= br; dy++) {
        for (let dx = -br; dx <= br; dx++) {
          const nc = cx + dx, nr = cy + dy;
          if (nc < 1 || nc >= cols-1 || nr < 1 || nr >= rows-1) continue;
          const d2 = dx*dx + dy*dy;
          if (d2 >= br*br || d2 < 1) continue;
          const d   = Math.sqrt(d2);
          const f   = (1 - d/br) * (1 - d/br) * REPEL_FORCE;
          const idx = nr * cols + nc;
          VX[idx] += (dx/d) * f;
          VY[idx] += (dy/d) * f;
        }
      }
    }

    // ── physics step ──────────────────────────────────────────────────
    function step() {
      H_nxt.set(H_cur);

      for (let r = 1; r < rows-1; r++) {
        for (let c = 1; c < cols-1; c++) {
          const i = r * cols + c;

          VX[i] *= FRICTION;
          VY[i] *= FRICTION;

          const vx = VX[i], vy = VY[i];
          const spd = Math.sqrt(vx*vx + vy*vy);
          if (spd < 0.008) continue;

          // Distribute height in both x and y proportionally
          const h = H_cur[i];
          const fx = Math.min(h * FLOW * Math.abs(vx), h * 0.3);
          const fy = Math.min(h * FLOW * Math.abs(vy), h * 0.3);

          if (fx > 0.0001) {
            const tc = vx > 0 ? c+1 : c-1;
            H_nxt[i]          -= fx;
            H_nxt[r*cols+tc]  += fx;
          }
          if (fy > 0.0001) {
            const tr = vy > 0 ? r+1 : r-1;
            H_nxt[i]          -= fy;
            H_nxt[tr*cols+c]  += fy;
          }
        }
      }

      // Swap buffers
      const tmp = H_cur; H_cur = H_nxt; H_nxt = tmp;
    }

    // ── render ────────────────────────────────────────────────────────
    function render() {
      const data = imgData.data;

      // Light: top-left
      const lx = -0.5, ly = -0.78, lz = 0.9;
      const ll  = Math.sqrt(lx*lx + ly*ly + lz*lz);
      const nlx = lx/ll, nly = ly/ll, nlz = lz/ll;

      for (let r = 1; r < rows-1; r++) {
        for (let c = 1; c < cols-1; c++) {
          const i  = r * cols + c;
          const h  = H_cur[i];

          // Surface normal: smooth gradient + per-grain noise
          const sgx = (H_cur[i+1]    - H_cur[i-1])    * NORM_SCALE;
          const sgy = (H_cur[i+cols] - H_cur[i-cols]) * NORM_SCALE;
          const gx  = sgx + NX[i] * GRAIN_NOISE;
          const gy  = sgy + NY[i] * GRAIN_NOISE;
          const gz  = 1.0;
          const gl  = Math.sqrt(gx*gx + gy*gy + gz*gz);
          const nx  = -gx/gl, ny = -gy/gl, nz = gz/gl;

          // Diffuse
          const ndl   = nx*nlx + ny*nly + nz*nlz;
          const diff  = Math.max(0, ndl);
          const light = 0.18 + 0.82 * diff;

          // Specular (tight — sand grains glint)
          const hx = nlx, hy = nly, hz = nlz + 1;
          const hl  = Math.sqrt(hx*hx + hy*hy + hz*hz);
          const sp  = Math.pow(Math.max(0, nx*(hx/hl)+ny*(hy/hl)+nz*(hz/hl)), 38) * 1.0;

          // Piled sand is raised and catches more highlight
          const hb = h > 1.0 ? 1 + (h-1)*1.1 : h < 0.6 ? h*0.8 : 1.0;

          const cl  = (v) => v < 0 ? 0 : v > 255 ? 255 : v | 0;
          const R   = cl(GR[i] * light * hb + sp * 255);
          const G   = cl(GG[i] * light * hb + sp * 215);
          const B   = cl(GB[i] * light * hb + sp * 175);
          // Thin sand becomes slightly transparent — content peeks through
          const A   = cl(Math.min(h * 1.1, 1.0) * 255);

          const px0 = c * GRID, py0 = r * GRID;
          for (let dy = 0; dy < GRID; dy++) {
            let pi = ((py0+dy)*W + px0) * 4;
            for (let dx = 0; dx < GRID; dx++, pi += 4) {
              data[pi]   = R;
              data[pi+1] = G;
              data[pi+2] = B;
              data[pi+3] = A;
            }
          }
        }
      }

      ctx.putImageData(imgData, 0, 0);
    }

    // ── loop ──────────────────────────────────────────────────────────
    function loop() {
      step();
      render();
      requestAnimationFrame(loop);
    }

    build();
    loop();

    // ── input ─────────────────────────────────────────────────────────
    window.addEventListener('mousemove', e => {
      ptr.x = e.clientX; ptr.y = e.clientY; ptr.on = true;
      repel(e.clientX, e.clientY);
    });
    window.addEventListener('mouseleave', () => { ptr.on = false; });

    window.addEventListener('touchmove', e => {
      const t = e.touches[0];
      repel(t.clientX, t.clientY);
    }, { passive: true });

    window.addEventListener('resize', build);
  </script>
</body>
</html>
